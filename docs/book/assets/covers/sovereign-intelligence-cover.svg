  <text id="si-title" x="56" y="180" fill="#f1f5f9" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="56" letter-spacing="-0.02em">Sovereign Intelligence</text>
  <text id="si-subtitle" x="56" y="232" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="24">Building Local-First RAG for Finance</text>
