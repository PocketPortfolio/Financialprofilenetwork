<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" aria-labelledby="si-title si-subtitle">
  <title>Sovereign Intelligence: Building Local-First RAG for Finance - Pocket Portfolio Technical Press</title>
  <defs>
    <linearGradient id="si-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="si-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="si-blur"><feGaussianBlur in="SourceGraphic" stdDeviation="80"/></filter>
    <filter id="si-glow"><feGaussianBlur in="SourceGraphic" stdDeviation="24"/></filter>
    <pattern id="si-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1e293b" stroke-width="0.35" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#si-bg)"/>
  <rect width="1200" height="630" fill="url(#si-grid)"/>
  <g filter="url(#si-blur)">
    <circle cx="1000" cy="160" r="320" fill="#0ea5e9" opacity="0.18"/>
    <circle cx="180" cy="500" r="280" fill="#34d399" opacity="0.14"/>
    <circle cx="1100" cy="500" r="200" fill="#2563eb" opacity="0.15"/>
  </g>
  <!-- Right: topic illustration - Local data to RAG (data chasm) -->
  <g fill="none" stroke="#334155" stroke-width="0.8" opacity="0.7">
    <rect x="620" y="80" width="520" height="480" rx="12"/>
  </g>
  <g fill="none" stroke="#34d399" stroke-width="2" opacity="0.9">
    <rect x="660" y="120" width="80" height="56" rx="8"/>
    <path d="M 668 148 h 64 M 668 156 h 48"/>
  </g>
  <text x="700" y="200" fill="#34d399" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="14" text-anchor="middle">Your data (local)</text>
  <path d="M 740 176 L 820 260" stroke="url(#si-accent)" stroke-width="2" stroke-dasharray="6 4" fill="none" opacity="0.9"/>
  <g filter="url(#si-glow)">
    <rect x="780" y="250" width="120" height="48" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.2"/>
    <text x="840" y="280" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" text-anchor="middle">Sanitized context</text>
  </g>
  <path d="M 840 298 L 840 360" stroke="url(#si-accent)" stroke-width="2" stroke-dasharray="6 4" fill="none" opacity="0.9"/>
  <g filter="url(#si-glow)">
    <circle cx="840" cy="400" r="50" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="840" y="395" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="14" text-anchor="middle">RAG</text>
    <text x="840" y="412" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Gemini</text>
  </g>
  <text x="840" y="470" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="11" text-anchor="middle">Local-first AI for finance</text>
