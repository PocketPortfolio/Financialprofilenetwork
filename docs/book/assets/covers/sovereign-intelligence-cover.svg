  <text x="56" y="310" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="13" letter-spacing="0.14em">POCKET PORTFOLIO</text>
  <rect x="56" y="322" width="160" height="4" rx="2" fill="url(#si-accent)" opacity="0.8"/>
  <text x="56" y="350" fill="#475569" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="11" letter-spacing="0.1em">TECHNICAL PRESS</text>
  <text x="56" y="420" fill="#334155" font-family="Inter, system-ui, sans-serif" font-size="12">Pocket Analyst, context engine,</text>
  <text x="56" y="438" fill="#334155" font-family="Inter, system-ui, sans-serif" font-size="12">and data sovereignty</text>
