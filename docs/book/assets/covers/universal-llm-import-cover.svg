  <line x1="56" y1="580" x2="1144" y2="580" stroke="#1c232b" stroke-width="1"/>
  <text x="56" y="608" fill="#5a6572" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" letter-spacing="0.08em">var(--accent-warm) · TERMINAL / PRO REFERENCE MANUAL</text>
