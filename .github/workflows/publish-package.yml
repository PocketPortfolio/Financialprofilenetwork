name: Publish package (packages/*)

on:
  push:
    tags:
      - "pkg-*-v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package folder under packages/, e.g. importer"
        required: true
        type: string
      tag:
        description: "Optional npm dist-tag (default: latest)"
        required: false
        type: string
        default: "latest"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve package dir from tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          PKG_INPUT="${{ inputs.package }}"
          REF="${GITHUB_REF_NAME}"
          if [[ -n "${PKG_INPUT}" ]]; then
            PKG_DIR="packages/${PKG_INPUT}"
          else
            # Tag format: pkg-<folder>-v<version>
            PKG_DIR="packages/${REF#pkg-}"
            PKG_DIR="${PKG_DIR%-v*}"
          fi
          if [[ ! -f "${PKG_DIR}/package.json" ]]; then
            echo "package_dir=${PKG_DIR}" >> "$GITHUB_OUTPUT"
            echo "Missing package.json in ${PKG_DIR}" >&2
            exit 1
          fi
          echo "package_dir=${PKG_DIR}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        working-directory: ${{ steps.resolve.outputs.package_dir }}
        run: npm ci

      - name: Build
        working-directory: ${{ steps.resolve.outputs.package_dir }}
        run: npm run build

      - name: Publish
        working-directory: ${{ steps.resolve.outputs.package_dir }}
        run: npm publish --access public --tag "${{ inputs.tag || 'latest' }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

