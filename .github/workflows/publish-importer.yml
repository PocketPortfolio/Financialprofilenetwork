name: Publish @pocket-portfolio/importer

on:
  push:
    tags:
      - "importer-v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/importer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify NPM_TOKEN present
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "Missing secrets.NPM_TOKEN. Add an npm publish token (granular token allowed by org 2FA policy) to GitHub Secrets as NPM_TOKEN."
            exit 1
          fi

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Auth check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm ping
          npm whoami

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

