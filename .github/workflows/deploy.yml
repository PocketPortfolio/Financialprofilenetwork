name: Deploy to Vercel
# Workflow for automated Vercel deployments
# Last updated: 2026-02-02 - Added concurrency control to prevent queue buildup

on:
  push:
    branches: [main]
  workflow_dispatch:

# Automatic deployment on all pushes to main
# Blog generation commits will trigger deployment automatically

# Concurrency: do NOT cancel in-progress runs so the current deploy can finish.
# New pushes will queue and run after the current run completes (unblocks stuck deploys).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Deploy includes DB checks, migrations, CI checks, build, and Vercel deployment
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "❌ ERROR: VERCEL_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "❌ ERROR: VERCEL_ORG_ID secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "❌ ERROR: VERCEL_PROJECT_ID secret is not set"
            exit 1
          fi
          echo "✅ All required secrets are set"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify Database Schema
        env:
          SUPABASE_SALES_DATABASE_URL: ${{ secrets.SUPABASE_SALES_DATABASE_URL }}
        run: |
          echo "🔍 Verifying production database schema..."
          npm run db:verify || echo "⚠️ Schema verification failed - continuing deployment (non-blocking)"
        continue-on-error: true
      
      - name: Run Database Migrations (if needed)
        env:
          SUPABASE_SALES_DATABASE_URL: ${{ secrets.SUPABASE_SALES_DATABASE_URL }}
        run: |
          echo "📤 Running production-safe migrations..."
          npm run db:migrate:prod || echo "⚠️ Migration completed with warnings (non-blocking)"
        continue-on-error: true
      
      - name: Validate Workflow Safety
        run: |
          echo "🔍 Validating workflow safety..."
          npm run validate-workflow-safety || echo "⚠️ Workflow validation warnings (non-blocking)"
        continue-on-error: true

      - name: Run CI checks
        run: |
          npm run lint || echo "⚠️ Lint warnings (non-blocking)"
          npm run typecheck || echo "⚠️ Typecheck warnings (non-blocking)"
          npm run test || echo "⚠️ Test failures (non-blocking)"
        continue-on-error: true
      
      # Block deploy if build fails so we never push a broken build to prod
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          ENCRYPTION_SECRET: ${{ secrets.ENCRYPTION_SECRET }}
          WAITLIST_DOUBLE_OPT_IN: false
      
      - name: Check commit message
        id: commit-check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          if echo "$COMMIT_MSG" | grep -q "\[skip ci\]"; then
            echo "⚠️ Commit contains [skip ci] - deployment will proceed (blog generation commit)"
          fi

      - name: Deploy to Vercel Production
        id: vercel-deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: .

      - name: Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.vercel-deploy.outcome }}" = "success" ]; then
            echo "✅ **Deployment to Vercel Production**" >> $GITHUB_STEP_SUMMARY
            echo "- Build completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "- Changes deployed to production" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deploy step failed** (exit code 1). Check Vercel dashboard and action logs (e.g. \`vercel inspect\`)." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📝 **Commit:** \`$(git log -1 --pretty=%h)\` - $(git log -1 --pretty=%s)" >> $GITHUB_STEP_SUMMARY

  deploy-preview:
    name: Deploy Preview (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Deploy to Vercel Preview
        uses: amondnet/vercel-action@v25
        id: vercel-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-comment: true
          working-directory: ./
      
      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Preview deployed!\n\n🔗 Preview URL: ${{ steps.vercel-deploy.outputs.preview-url }}`
            })

