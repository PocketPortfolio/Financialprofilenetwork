name: Deploy to Vercel
# Workflow for automated Vercel deployments
# Last updated: 2026-02-02 - Added concurrency control to prevent queue buildup

on:
  push:
    branches: [main]
  workflow_dispatch:

# Automatic deployment on all pushes to main
# Blog generation commits will trigger deployment automatically

# Concurrency: do NOT cancel in-progress runs so the current deploy can finish.
# New pushes will queue and run after the current run completes (unblocks stuck deploys).
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Deploy includes DB checks, migrations, CI checks, build, and Vercel deployment
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Verify Secrets
        run: |
          err=0
          [ -z "${{ secrets.VERCEL_TOKEN }}" ] && echo "❌ VERCEL_TOKEN is not set" && err=1
          [ -z "${{ secrets.VERCEL_ORG_ID }}" ] && echo "❌ VERCEL_ORG_ID is not set" && err=1
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ] && echo "❌ VERCEL_PROJECT_ID is not set" && err=1
          [ $err -eq 1 ] && echo "→ Add missing secrets in repo Settings → Secrets and variables → Actions" && exit 1
          echo "✅ All required Vercel secrets are set"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Vercel CLI
        run: npm install --global vercel@33
      
      - name: Pull Vercel project link
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
      
      - name: Deploy to Vercel Production
        id: vercel-deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --token="${{ secrets.VERCEL_TOKEN }}" --yes

      - name: Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.vercel-deploy.outcome }}" = "success" ]; then
            echo "✅ **Deployment to Vercel Production**" >> $GITHUB_STEP_SUMMARY
            echo "- Build completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "- Changes deployed to production" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deploy step failed** (exit code 1). Check Vercel dashboard and action logs (e.g. \`vercel inspect\`)." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📝 **Commit:** \`$(git log -1 --pretty=%h)\` - $(git log -1 --pretty=%s)" >> $GITHUB_STEP_SUMMARY

  deploy-preview:
    name: Deploy Preview (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Deploy to Vercel Preview
        uses: amondnet/vercel-action@v25
        id: vercel-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-comment: true
          working-directory: ./
      
      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Preview deployed!\n\n🔗 Preview URL: ${{ steps.vercel-deploy.outputs.preview-url }}`
            })

