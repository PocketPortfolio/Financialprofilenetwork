  <g fill="#f59e0b">
    <path d="M62 78a20 20 0 0 1 20-20h52c28 0 44 16 44 40s-16 40-44 40H122v40a20 20 0 0 1-20 20H82a20 20 0 0 1-20-20V78zm40 20v20h32c8 0 12-4 12-10s-4-10-12-10h-32z"/>
