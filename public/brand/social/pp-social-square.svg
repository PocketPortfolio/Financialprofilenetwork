<svg width="1024" height="1024" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!--
    Pocket Portfolio: SOCIAL ONLY square monogram.

    Full-bleed dark surface with NO rounded corners so platforms that
    apply a circular avatar mask (LinkedIn, X, Meta) trim the corners
    cleanly instead of revealing dark cutouts at the inscribed circle.

    Do not reference this asset from product UI. Use
    /brand/pp-monogram-amber.svg or /brand/pp-icon.png there.

    Safe-zone: monogram occupies ~60 percent of the canvas, well inside
    the inscribed circle (r=128), so the mark survives any platform's
    circular crop without clipping.
  -->
