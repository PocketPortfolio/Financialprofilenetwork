<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" aria-labelledby="uli-title uli-subtitle">
  <title>Universal LLM Import: Building Local-First, Sovereign CSV Ingestion - Pocket Portfolio Technical Press</title>
  <defs>
    <linearGradient id="uli-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="uli-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="uli-blur"><feGaussianBlur in="SourceGraphic" stdDeviation="80"/></filter>
    <filter id="uli-glow"><feGaussianBlur in="SourceGraphic" stdDeviation="24"/></filter>
    <pattern id="uli-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.35" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#uli-bg)"/>
  <rect width="1200" height="630" fill="url(#uli-grid)"/>
  <g filter="url(#uli-blur)">
    <circle cx="220" cy="140" r="260" fill="#34d399" opacity="0.16"/>
    <circle cx="950" cy="480" r="300" fill="#2563eb" opacity="0.18"/>
    <circle cx="640" cy="320" r="160" fill="#0ea5e9" opacity="0.1"/>
  </g>
  <!-- Right: topic illustration - CSV to normalized pipeline -->
  <g fill="none" stroke="#334155" stroke-width="0.8" opacity="0.7">
    <rect x="600" y="60" width="540" height="500" rx="12"/>
  </g>
  <g fill="#1e293b" stroke="#34d399" stroke-width="1.2">
    <rect x="640" y="100" width="140" height="100" rx="6"/>
    <path d="M 650 125 h 120 M 650 145 h 120 M 650 165 h 80 M 650 185 h 100" stroke="#475569" stroke-width="0.8" fill="none"/>
  </g>
  <text x="710" y="225" fill="#34d399" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="14" text-anchor="middle">Broker CSV</text>
  <path d="M 710 200 L 710 270" stroke="url(#uli-accent)" stroke-width="2" fill="none" opacity="0.9"/>
  <polygon points="700,270 710,290 720,270" fill="#34d399" opacity="0.9"/>
  <g filter="url(#uli-glow)">
    <rect x="620" y="290" width="180" height="52" rx="8" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.2"/>
    <text x="710" y="318" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" text-anchor="middle">Schema inference</text>
    <text x="710" y="332" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Heuristic + optional LLM</text>
  </g>
  <path d="M 710 342 L 710 400" stroke="url(#uli-accent)" stroke-width="2" fill="none" opacity="0.9"/>
  <polygon points="700,400 710,420 720,400" fill="#2563eb" opacity="0.9"/>
  <g filter="url(#uli-glow)">
    <rect x="620" y="420" width="180" height="52" rx="8" fill="#1e293b" stroke="#2563eb" stroke-width="1.2"/>
    <text x="710" y="445" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="12" text-anchor="middle">NormalizedTrade[]</text>
    <text x="710" y="462" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Sovereign, local-first</text>
  </g>
  <text x="710" y="520" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="11" text-anchor="middle">Universal import pipeline</text>
  <!-- Left: title block and branding -->
  <text id="uli-title" x="56" y="168" fill="#f1f5f9" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="48" letter-spacing="-0.02em">Universal LLM Import</text>
  <text id="uli-subtitle" x="56" y="218" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="22">Building Local-First, Sovereign CSV Ingestion</text>
  <rect x="56" y="232" width="420" height="5" rx="2.5" fill="url(#uli-accent)"/>
  <text x="56" y="290" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="13" letter-spacing="0.14em">POCKET PORTFOLIO</text>
  <rect x="56" y="302" width="160" height="4" rx="2" fill="url(#uli-accent)" opacity="0.8"/>
  <text x="56" y="330" fill="#475569" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="11" letter-spacing="0.1em">TECHNICAL PRESS</text>
  <text x="56" y="400" fill="#334155" font-family="Inter, system-ui, sans-serif" font-size="12">Schema inference, confidence thresholds,</text>
  <text x="56" y="418" fill="#334155" font-family="Inter, system-ui, sans-serif" font-size="12">and sovereign data in financial CSV</text>
</svg>
