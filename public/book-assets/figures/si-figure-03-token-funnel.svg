  <path fill="none" d="M200 96 L200 116" stroke="#475569" stroke-width="1.2" marker-end="url(#si-a3)"/>
  <!-- Middle -->
  <rect x="140" y="116" width="120" height="36" rx="4" fill="#e2e8f0" stroke="#475569" stroke-width="1"/>
