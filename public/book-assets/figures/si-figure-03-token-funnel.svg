  <text x="200" y="248" text-anchor="middle" font-size="9" fill="#fff">≤4K tokens</text>
  <!-- Labels: below bottom bar -->
  <text x="200" y="272" text-anchor="middle" font-size="9" fill="#64748b">Signal preserved; noise dropped</text>
