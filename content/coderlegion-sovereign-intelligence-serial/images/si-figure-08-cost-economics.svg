  <path fill="none" d="M480 90 L500 90" stroke="#475569" stroke-width="1.2" marker-end="url(#si-a8)"/>
  <rect x="500" y="72" width="40" height="36" rx="6" fill="#f1f5f9" stroke="#475569" stroke-width="1.2"/>
  <text x="520" y="94" text-anchor="middle" font-size="9">+1</text>
  <!-- Table: narrower and centered (80px margin each side), 4 equal columns -->
  <rect x="80" y="132" width="400" height="80" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="80" y1="154" x2="480" y2="154" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="180" y1="132" x2="180" y2="212" stroke="#e2e8f0" stroke-width="1"/>
