  <line x1="380" y1="132" x2="380" y2="212" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Header: column centers 130, 230, 330, 430 -->
  <text x="130" y="148" text-anchor="middle" font-size="9" font-weight="600">Tier</text>
  <text x="230" y="148" text-anchor="middle" font-size="9" font-weight="600">Quota</text>
  <text x="330" y="148" text-anchor="middle" font-size="9" font-weight="600">Model</text>
