<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 248" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="11" fill="#1e293b">
  <defs>
    <marker id="si-a8" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0 0 L8 3 L0 6 z" fill="#475569"/></marker>
  </defs>
  <!-- Title centered -->
  <text x="280" y="28" text-anchor="middle" font-weight="600" font-size="12">Figure 8 — Cost / Unit Economics</text>
