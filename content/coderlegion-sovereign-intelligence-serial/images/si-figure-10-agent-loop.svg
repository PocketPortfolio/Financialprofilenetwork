<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="11" fill="#1e293b">
  <defs>
    <marker id="si-a10" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0 0 L8 3 L0 6 z" fill="#475569"/></marker>
  </defs>
  <!-- Sequence: User -> Model -> Tool -> Confirmation -> Execute/Cancel -->
  <rect x="20" y="56" width="72" height="48" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="1.2"/>
  <text x="56" y="82" text-anchor="middle" font-size="10">User</text>
  <path fill="none" d="M92 80 L112 80" stroke="#475569" stroke-width="1.2" marker-end="url(#si-a10)"/>
  <rect x="112" y="56" width="72" height="48" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="1.2"/>
  <text x="148" y="82" text-anchor="middle" font-size="10">Model</text>
  <path fill="none" d="M184 80 L204 80" stroke="#475569" stroke-width="1.2" marker-end="url(#si-a10)"/>
  <rect x="204" y="56" width="72" height="48" rx="6" fill="#fefce8" stroke="#a16207" stroke-width="1.2"/>
  <text x="240" y="82" text-anchor="middle" font-size="10">Tool call</text>
  <path fill="none" d="M276 80 L296 80" stroke="#475569" stroke-width="1.2" marker-end="url(#si-a10)"/>
  <rect x="296" y="56" width="88" height="48" rx="6" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.2"/>
  <text x="340" y="78" text-anchor="middle" font-size="10">Confirmation</text>
  <text x="340" y="92" text-anchor="middle" font-size="9">(human)</text>
  <path fill="none" d="M384 80 L404 80" stroke="#475569" stroke-width="1.2" marker-end="url(#si-a10)"/>
  <rect x="404" y="56" width="136" height="48" rx="6" fill="#e0f2f1" stroke="#0f766e" stroke-width="1.2"/>
  <text x="472" y="78" text-anchor="middle" font-size="10">Execute or Cancel</text>
  <text x="472" y="92" text-anchor="middle" font-size="9">No auto-execution</text>
  <!-- Title -->
  <text x="280" y="28" text-anchor="middle" font-weight="600" font-size="12">Figure 10 — Agent Loop (human in the loop)</text>
</svg>
